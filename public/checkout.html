    <div class="container py-5 mt-5">

                <div class="ranch-box">
                    <h2 class="serif mb-4">Checkout Information</h2>
                    <form id="orderForm" action="/submit-order" method="POST">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" name="fullName" class="form-control rounded-pill" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control rounded-pill" required>
        </div>
        <div class="col-12">
            <label class="form-label">Delivery Note</label>
            <textarea name="note" class="form-control rounded-4" rows="3"></textarea>
        </div>
        
        <input type="hidden" id="signatureData" name="signatureData">
        <input type="hidden" id="cartData" name="cartData">
        <input type="hidden" id="totalPriceInput" name="totalPrice">

        <div class="col-12">
            <label class="form-label">Signature</label>
            <canvas id="signature-pad" class="form-control rounded-4" style="height:150px; border:1px solid #262626; cursor:crosshair;"></canvas>
            <button type="button" class="btn mt-2" id="clear-signature" style="background-color:#262626; color:white;">Clear Signature</button>
        </div>
        <div class="col-12 mt-4">
            <button type="submit" class="btn-ranch w-100">Confirm Order</button>
        </div>
    </div>
</form>
                </div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>

<script src="cart.js"></script>
<script>
document.getElementById('orderForm').onsubmit = function() {
    // 1. Get cart from localStorage
    const cart = localStorage.getItem('cart') || "[]";
    document.getElementById('cartData').value = cart;

    // 2. Get total price from your UI
    const total = document.getElementById('total-price').innerText;
    document.getElementById('totalPriceInput').value = total;

    // 3. Get Signature from Canvas
    const canvas = document.getElementById('signature-pad');
    const signatureImage = canvas.toDataURL(); // Converts drawing to a string
    document.getElementById('signatureData').value = signatureImage;

    // Form continues to submit to /submit-order
};
</script>
