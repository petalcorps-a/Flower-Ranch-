<div class="container py-5 mt-5">
    <h1 class="serif display-4 text-center mb-5">Moments at the Ranch</h1>

    <!-- Animated Image Carousel -->
    <div id="ranchCarousel" class="carousel slide mb-5" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#ranchCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#ranchCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#ranchCarousel" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner rounded-4 shadow">
            <div class="carousel-item active">
                <img src="https://flowerranchcafe.com/cdn/shop/files/DSCF8765.jpg?v=1688654561&width=1200" class="d-block w-100" style="height: 500px; object-fit: cover;" alt="Cafe interior">
            </div>
            <div class="carousel-item">
                <img src="https://flowerranchcafe.com/cdn/shop/products/DSCF8567.jpg?v=1681198077&width=1200" class="d-block w-100" style="height: 500px; object-fit: cover;" alt="Flower arrangements">
            </div>
            <div class="carousel-item">
                <img src="https://flowerranchcafe.com/cdn/shop/collections/DSCF0087_6eadd5a5-c261-4c20-98e7-3f00d8c00538.jpg?v=1701368974&width=1200" class="d-block w-100" style="height: 500px; object-fit: cover;" alt="Coffee and pastries">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#ranchCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#ranchCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-md-6 col-lg-4">
            <img src="https://flowerranchcafe.com/cdn/shop/files/DSCF8765.jpg?v=1688654561&width=750" class="gallery-item shadow-sm" onclick="openLightbox(this.src)">
        </div>
        <div class="col-md-6 col-lg-4">
            <img src="https://flowerranchcafe.com/cdn/shop/products/DSCF8567.jpg?v=1681198077&width=750" class="gallery-item shadow-sm" onclick="openLightbox(this.src)">

        <div class="col-md-6 col-lg-4">

        </div>
        <div class="col-md-6 col-lg-4">
            <img src="https://flowerranchcafe.com/cdn/shop/collections/DSCF1035.jpg?v=1692591348&width=750" class="gallery-item shadow-sm" onclick="openLightbox(this.src)">
        </div>
    </div>
</div>
